# Timeweb Cloud App Platform — Docker Compose (корень репозитория)
# MySQL: отдельно в панели Timeweb Cloud → Базы данных
# Переменные задайте в App Platform или через env_file

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
